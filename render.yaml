services:
  # Backend — Docker web service, build context repo root (Dockerfile bakes in data/)
  - type: web
    name: flight-predictor-v2-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_API_KEY_2
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  # Frontend — static site (free, CDN, never sleeps). Rewrites replace nginx proxy.
  - type: web
    name: flight-predictor-v2-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /predict
        destination: https://flight-predictor-v2-backend.onrender.com/predict
      - type: rewrite
        source: /explain
        destination: https://flight-predictor-v2-backend.onrender.com/explain
      - type: rewrite
        source: /history
        destination: https://flight-predictor-v2-backend.onrender.com/history
      - type: rewrite
        source: /chat
        destination: https://flight-predictor-v2-backend.onrender.com/chat
      - type: rewrite
        source: /health
        destination: https://flight-predictor-v2-backend.onrender.com/health
      # SPA fallback
      - type: rewrite
        source: /*
        destination: /index.html
